<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>전화번호부</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="noise"></div>

  <header>
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">📞</span>
        <span class="logo-text">PhoneBook</span>
      </div>
      <button class="btn-add" onclick="openModal()">+ 연락처 추가</button>
    </div>
  </header>

  <main>
    <section class="controls">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="이름, 전화번호, 이메일 검색..." oninput="filterContacts()" />
      </div>
      <div class="group-filter">
        <button class="filter-btn active" onclick="setGroup('')" data-group="">전체</button>
        <button class="filter-btn" onclick="setGroup('가족')" data-group="가족">가족</button>
        <button class="filter-btn" onclick="setGroup('친구')" data-group="친구">친구</button>
        <button class="filter-btn" onclick="setGroup('직장')" data-group="직장">직장</button>
        <button class="filter-btn" onclick="setGroup('기타')" data-group="기타">기타</button>
      </div>
    </section>

    <section class="stats">
      <div class="stat-card">
        <span class="stat-num" id="totalCount">0</span>
        <span class="stat-label">전체</span>
      </div>
      <div class="stat-card">
        <span class="stat-num" id="familyCount">0</span>
        <span class="stat-label">가족</span>
      </div>
      <div class="stat-card">
        <span class="stat-num" id="friendCount">0</span>
        <span class="stat-label">친구</span>
      </div>
      <div class="stat-card">
        <span class="stat-num" id="workCount">0</span>
        <span class="stat-label">직장</span>
      </div>
    </section>

    <section class="contacts-grid" id="contactsGrid">
      <!-- 연락처 카드가 여기에 렌더링됩니다 -->
    </section>

    <div class="empty-state" id="emptyState" style="display:none">
      <span>📭</span>
      <p>연락처가 없습니다</p>
    </div>
  </main>

  <!-- 모달 -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">연락처 추가</h2>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="editId" />
        <div class="form-group">
          <label>이름 *</label>
          <input type="text" id="inputName" placeholder="홍길동" />
        </div>
        <div class="form-group">
          <label>전화번호 *</label>
          <input type="tel" id="inputPhone" placeholder="010-0000-0000" />
        </div>
        <div class="form-group">
          <label>이메일</label>
          <input type="email" id="inputEmail" placeholder="example@email.com" />
        </div>
        <div class="form-group">
          <label>그룹</label>
          <select id="inputGroup">
            <option value="가족">가족</option>
            <option value="친구">친구</option>
            <option value="직장">직장</option>
            <option value="기타">기타</option>
          </select>
        </div>
        <div class="form-error" id="formError"></div>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" onclick="closeModal()">취소</button>
        <button class="btn-save" onclick="saveContact()">저장</button>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
